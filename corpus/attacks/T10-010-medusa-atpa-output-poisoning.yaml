signals:
  literal_substrings:
    - "IMPORTANT:"
    - "CRITICAL:"
    - "WARNING:"
    - "SYSTEM:"
  concealment_phrases:
    - "silently"
  pseudo_xml_tags:
    - "system"
    - "instruction"
    - "hidden"
    - "override"
